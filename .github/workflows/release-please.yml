name: Release Please

# Maintains a rolling "release PR" against main that bumps the version and
# accumulates a CHANGELOG entry from Conventional Commits. When the release
# PR is merged, release-please pushes a `vX.Y.Z` tag and creates a GitHub
# Release. Because that tag is created with the default GITHUB_TOKEN,
# GitHub will NOT fire `push: tags` for `release.yml` (loop-prevention),
# so this workflow explicitly dispatches release.yml in a follow-up job.
#
# Conventional Commit prefixes drive the version bump:
#   feat:    → minor bump  (1.7.7 → 1.8.0)
#   fix:     → patch bump  (1.7.7 → 1.7.8)
#   feat!:   → major bump  (1.7.7 → 2.0.0)
#   chore/docs/ci/etc. → no bump, hidden from changelog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # release-please does not currently need id-token, but enabling it keeps
  # the workflow forward-compatible if Sigstore signing is added later.
  id-token: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          # Read version from manifest and config from JSON. This avoids
          # duplicating the config in YAML and keeps schema validation
          # available from the JSON schema reference.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Default GITHUB_TOKEN is fine — branch protection is bypassed for
          # the release-please PR via the maintainer review flow, not via
          # auto-merge.
          token: ${{ secrets.GITHUB_TOKEN }}

  # GitHub deliberately does NOT fire `push`/`release` events when a tag or
  # release is created using the default GITHUB_TOKEN (loop-prevention).
  # That means `release.yml` (trigger: push tags v*) never runs for tags
  # release-please pushes. To work around it, explicitly dispatch
  # release.yml via workflow_dispatch whenever a release is created.
  dispatch-apk-build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch Release APK workflow for ${{ needs.release-please.outputs.tag_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          echo "Dispatching release.yml against tag $TAG"
          gh workflow run release.yml --ref "$TAG" --repo "${{ github.repository }}"
