name: Release Please

# Maintains a rolling "release PR" against main that bumps the version and
# accumulates a CHANGELOG entry from Conventional Commits. When the release
# PR is merged, release-please pushes a `vX.Y.Z` tag — which in turn fires
# `release.yml` to build and publish the APK.
#
# Conventional Commit prefixes drive the version bump:
#   feat:    → minor bump  (1.7.7 → 1.8.0)
#   fix:     → patch bump  (1.7.7 → 1.7.8)
#   feat!:   → major bump  (1.7.7 → 2.0.0)
#   chore/docs/ci/etc. → no bump, hidden from changelog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # release-please does not currently need id-token, but enabling it keeps
  # the workflow forward-compatible if Sigstore signing is added later.
  id-token: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Read version from manifest and config from JSON. This avoids
          # duplicating the config in YAML and keeps schema validation
          # available from the JSON schema reference.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Default GITHUB_TOKEN is fine — branch protection is bypassed for
          # the release-please PR via the maintainer review flow, not via
          # auto-merge.
          token: ${{ secrets.GITHUB_TOKEN }}
