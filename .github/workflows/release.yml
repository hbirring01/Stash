name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        run: |
          if [ -z "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" ]; then
            echo "::error::SIGNING_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/upgrade.keystore

      - name: Compute versionCode / versionName from tag
        id: ver
        run: |
          TAG="${{ github.ref_name }}"          # e.g. v1.2.3
          VERSION_NAME="${TAG#v}"               # 1.2.3
          IFS='.' read -r MAJ MIN PAT <<< "$VERSION_NAME"
          MAJ=${MAJ:-0}; MIN=${MIN:-0}; PAT=${PAT:-0}
          VERSION_CODE=$(( MAJ * 10000 + MIN * 100 + PAT ))
          echo "name=$VERSION_NAME"  >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE"  >> "$GITHUB_OUTPUT"
          echo "Resolved versionName=$VERSION_NAME versionCode=$VERSION_CODE"

      - name: Assemble release APK
        run: ./gradlew assembleRelease
        env:
          FOURSQUARE_API_KEY: ${{ secrets.FOURSQUARE_API_KEY }}
          RELEASE_VERSION_NAME: ${{ steps.ver.outputs.name }}
          RELEASE_VERSION_CODE: ${{ steps.ver.outputs.code }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Rename APK
        id: apk
        run: |
          mkdir -p artifacts
          APK="artifacts/StashApp-${{ github.ref_name }}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK"
          SIZE=$(du -h "$APK" | cut -f1)
          SHA=$(sha256sum "$APK" | cut -d' ' -f1)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Build changelog from commits
        id: changelog
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          PREV=$(git tag --sort=-creatordate | grep -E '^v[0-9]' | grep -v "^${TAG}$" | head -n 1 || true)
          if [ -z "$PREV" ]; then
            RANGE="HEAD"
            COMPARE=""
          else
            RANGE="${PREV}..HEAD"
            COMPARE="https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}"
          fi
          echo "Computing changelog for range: $RANGE"

          # Detect the one-time applicationId rename that landed in commit
          # f27a555 (com.example.creditcardapp -> com.app.stash.android).
          # Show the uninstall-and-reinstall warning only when this TAG ships
          # under the new id AND PREV still ships under the old one — so that
          # cherry-picked v1.7.x bugfix tags (which don't contain the rename)
          # don't get a misleading warning.
          PRE_RENAME=false
          RENAME_COMMIT=f27a555038f4e17dcfde7944a454006382e9682e
          if [ -n "$PREV" ] \
            && git merge-base --is-ancestor "$RENAME_COMMIT" "$TAG" \
            && ! git merge-base --is-ancestor "$RENAME_COMMIT" "$PREV"; then
            PRE_RENAME=true
          fi

          # Group commits by conventional-commit prefix
          feats=$(git log --no-merges --pretty=format:'- %s (%h)' $RANGE | grep -iE '^- (feat|feature)(\(.*\))?:' || true)
          fixes=$(git log --no-merges --pretty=format:'- %s (%h)' $RANGE | grep -iE '^- fix(\(.*\))?:' || true)
          ui=$(git log --no-merges --pretty=format:'- %s (%h)' $RANGE | grep -iE '^- (ui|ux|style)(\(.*\))?:' || true)
          perf=$(git log --no-merges --pretty=format:'- %s (%h)' $RANGE | grep -iE '^- perf(\(.*\))?:' || true)
          docs=$(git log --no-merges --pretty=format:'- %s (%h)' $RANGE | grep -iE '^- docs?(\(.*\))?:' || true)
          chore=$(git log --no-merges --pretty=format:'- %s (%h)' $RANGE | grep -iE '^- (chore|refactor|build|ci|test|deps)(\(.*\))?:' || true)
          # Everything else (no recognised prefix)
          other=$(git log --no-merges --pretty=format:'- %s (%h)' $RANGE \
            | grep -ivE '^- (feat|feature|fix|ui|ux|style|perf|docs?|chore|refactor|build|ci|test|deps)(\(.*\))?:' || true)

          {
            echo "## 📦 StashApp ${TAG}"
            echo ""
            echo "### 📲 Install"
            echo "Download **StashApp-${TAG}.apk** from the Assets below and install on your Android device."
            echo "- Min Android: 8.0 (API 26)"
            echo "- Size: ${{ steps.apk.outputs.size }}"
            echo "- SHA-256: \`${{ steps.apk.outputs.sha256 }}\`"
            echo ""
            if [ "$PRE_RENAME" = "true" ]; then
              echo "> ⚠️ **Upgrading from ${PREV}?** This release moves to a new package id (\`com.app.stash.android\`, previously \`com.example.creditcardapp\`). Android treats it as a separate app, so you must **uninstall the old app first** (local data will be lost) and install this APK fresh. Subsequent v1.8.0+ updates will install in place without data loss."
            else
              echo "> Signed with the stable upgrade keystore — installs over previous v1.8.0+ builds **without wiping data**."
            fi
            echo ""
            echo "### ✨ What's Changed"
            [ -n "$feats" ]  && { echo ""; echo "#### 🚀 Features";        echo "$feats"; }
            [ -n "$fixes" ]  && { echo ""; echo "#### 🐛 Bug Fixes";       echo "$fixes"; }
            [ -n "$ui" ]     && { echo ""; echo "#### 🎨 UI / UX";          echo "$ui"; }
            [ -n "$perf" ]   && { echo ""; echo "#### ⚡ Performance";      echo "$perf"; }
            [ -n "$docs" ]   && { echo ""; echo "#### 📚 Documentation";    echo "$docs"; }
            [ -n "$chore" ]  && { echo ""; echo "#### 🧰 Maintenance";      echo "$chore"; }
            [ -n "$other" ]  && { echo ""; echo "#### 📝 Other";            echo "$other"; }
            echo ""
            if [ -n "$COMPARE" ]; then
              echo "**Full Diff:** [\`${PREV}...${TAG}\`](${COMPARE})"
              echo ""
            fi
            echo "---"
          } > RELEASE_NOTES.md

          echo "----- Generated notes -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v3
        with:
          name: StashApp ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: artifacts/*.apk
