name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compute versionCode / versionName from tag
        id: ver
        run: |
          TAG="${{ github.ref_name }}"          # e.g. v1.2.3
          VERSION_NAME="${TAG#v}"               # 1.2.3
          IFS='.' read -r MAJ MIN PAT <<< "$VERSION_NAME"
          MAJ=${MAJ:-0}; MIN=${MIN:-0}; PAT=${PAT:-0}
          VERSION_CODE=$(( MAJ * 10000 + MIN * 100 + PAT ))
          echo "name=$VERSION_NAME"  >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE"  >> "$GITHUB_OUTPUT"
          echo "Resolved versionName=$VERSION_NAME versionCode=$VERSION_CODE"

      - name: Assemble release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          FOURSQUARE_API_KEY: ${{ secrets.FOURSQUARE_API_KEY }}
          RELEASE_VERSION_NAME: ${{ steps.ver.outputs.name }}
          RELEASE_VERSION_CODE: ${{ steps.ver.outputs.code }}

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk "artifacts/StashApp-${{ github.ref_name }}.apk"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*.apk
