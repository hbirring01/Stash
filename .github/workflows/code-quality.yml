name: Code Quality

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ktlint
        uses: ScaCap/action-ktlint@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_on_error: false
          android: true

  detekt:
    name: detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download detekt
        run: |
          curl -sSLO "https://github.com/detekt/detekt/releases/download/v1.23.7/detekt-cli-1.23.7.zip"
          unzip -q detekt-cli-1.23.7.zip
          chmod +x detekt-cli-1.23.7/bin/detekt-cli
      - name: Run detekt
        run: |
          ./detekt-cli-1.23.7/bin/detekt-cli \
            --build-upon-default-config \
            --input app/src/main \
            --report sarif:detekt-report.sarif \
          || true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: detekt-report.sarif
          category: detekt
