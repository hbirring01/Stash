name: Code Quality

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    # Advisory only: ktlint findings appear in the job log and step summary
    # but do NOT post inline review comments on every PR and do NOT mark the
    # check as FAILURE on style nits. Run `./gradlew ktlintFormat` locally if
    # one project ever wires it in; until then this is informational.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: ktlint
        uses: ScaCap/action-ktlint@26c5e9b625966139d9956cbbb6217375480d4e14 # v1.9.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-check
          fail_on_error: false
          android: true
          level: warning

  detekt:
    name: detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download detekt
        run: |
          curl -sSLO "https://github.com/detekt/detekt/releases/download/v1.23.7/detekt-cli-1.23.7.zip"
          unzip -q detekt-cli-1.23.7.zip
          chmod +x detekt-cli-1.23.7/bin/detekt-cli
      - name: Run detekt
        run: |
          ./detekt-cli-1.23.7/bin/detekt-cli \
            --build-upon-default-config \
            --input app/src/main \
            --report sarif:detekt-report.sarif \
          || true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: detekt-report.sarif
          category: detekt
