name: Code Quality

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Advisory only: ktlint findings appear in the job log and step summary
    # but do NOT post inline review comments on every PR and do NOT mark the
    # check as FAILURE on style nits. Run `./gradlew ktlintFormat` locally if
    # one project ever wires it in; until then this is informational.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: ktlint
        uses: ScaCap/action-ktlint@26c5e9b625966139d9956cbbb6217375480d4e14 # v1.9.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-check
          fail_on_error: false
          android: true
          level: warning

  detekt:
    name: detekt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DETEKT_VERSION: 1.23.7
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      # Cache the detekt-cli zip so we don't hit GitHub Releases every PR.
      # Keyed on the version so a bump invalidates automatically.
      - name: Cache detekt CLI
        id: cache-detekt
        uses: actions/cache@v4
        with:
          path: detekt-cli-${{ env.DETEKT_VERSION }}
          key: detekt-cli-${{ env.DETEKT_VERSION }}-${{ runner.os }}
      - name: Download detekt
        if: steps.cache-detekt.outputs.cache-hit != 'true'
        run: |
          curl -sSLO "https://github.com/detekt/detekt/releases/download/v${DETEKT_VERSION}/detekt-cli-${DETEKT_VERSION}.zip"
          unzip -q detekt-cli-${DETEKT_VERSION}.zip
          chmod +x detekt-cli-${DETEKT_VERSION}/bin/detekt-cli
      - name: Run detekt
        run: |
          ./detekt-cli-${DETEKT_VERSION}/bin/detekt-cli \
            --build-upon-default-config \
            --input app/src/main \
            --report sarif:detekt-report.sarif \
          || true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: detekt-report.sarif
          category: detekt
