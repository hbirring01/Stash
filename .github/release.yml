# Configures GitHub's auto-generated release notes
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
        - feat
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
        - bugfix
    - title: "🎨 UI / UX"
      labels:
        - ui
        - ux
        - design
    - title: "⚡ Performance"
      labels:
        - performance
        - perf
    - title: "🔒 Security"
      labels:
        - security
    - title: "📚 Documentation"
      labels:
        - documentation
        - docs
    - title: "🧰 Maintenance"
      labels:
        - chore
        - refactor
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"
